plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.78'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

version = project.mod_version
group = project.mod_group_id

base {
    archivesName = project.mod_id
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

neoForge {
    // এটি তোমার gradle.properties এর ১.২১.১১ ভার্সনটি ব্যবহার করবে
    version = project.neo_version

    // Parchment ব্লকটি সরিয়ে দেওয়া হয়েছে কারণ এটি সার্ভারে পাওয়া যাচ্ছে না।
    // এখন এটি ডিফল্ট Mojang ম্যাপ ব্যবহার করবে যা ১.২১.১১ এর জন্য পারফেক্ট।

    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        server {
            server()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
    }

    mods {
        "${project.mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    mavenCentral()
    maven { url = 'https://maven.neoforged.net/releases' }
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
            "Specification-Title"     : project.mod_id,
            "Specification-Vendor"    : project.mod_authors,
            "Specification-Version"   : "1",
            "Implementation-Title"    : project.mod_name,
            "Implementation-Version"  : project.mod_version,
            "Implementation-Vendor"   : project.mod_authors,
            "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}
