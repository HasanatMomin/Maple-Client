plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.78'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

// প্রজেক্টের ভার্সন ও গ্রুপ আইডি প্রপার্টিজ ফাইল থেকে নিচ্ছে
version = project.mod_version
group = project.mod_group_id

base {
    archivesName = project.mod_id
}

// Minecraft 1.21.11 এর জন্য Java 21 দরকার
java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

neoForge {
    // এটি gradle.properties এর neo_version থেকে ভার্সন নেবে
    version = project.neo_version

    parchment {
        minecraftVersion = project.neogradle.subsystems.parchment.minecraftVersion
        mappingsVersion = project.neogradle.subsystems.parchment.mappingsVersion
    }

    // রান কনফিগারেশন - যা তোমার আগের এররটি ফিক্স করবে
    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        server {
            server()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
    }

    mods {
        "${project.mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

// রিসোর্স ফোল্ডার সেটআপ
sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    mavenCentral()
    maven { url = 'https://maven.neoforged.net/releases' }
}

dependencies {
    // এখানে অতিরিক্ত কোনো লাইব্রেরি থাকলে যোগ করতে পারো
}

// JAR ফাইলের তথ্য সেটআপ
tasks.named('jar', Jar).configure {
    manifest {
        attributes([
            "Specification-Title"     : project.mod_id,
            "Specification-Vendor"    : project.mod_authors,
            "Specification-Version"   : "1",
            "Implementation-Title"    : project.mod_name,
            "Implementation-Version"  : project.mod_version,
            "Implementation-Vendor"   : project.mod_authors,
            "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

// পাবলিশিং সেটিংস
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
}
